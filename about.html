<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="who am i">
  <link rel="shortcut icon" href="/IMG_20211221_075939_994_transcpr.jpg">
  <title>Who Am I</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    header {
      display: grid;
      place-content: center;
      overflow: hidden;
      background:
          repeating-linear-gradient(25deg, royalblue, #2320, teal 5%)center/cover,
          repeating-linear-gradient(115deg, violet, #2320, orange 5%)center/cover,
          grey center/cover no-repeat;
      height: 70vh;
      max-height: 40rem;
      padding: 1rem;
      font-size: 3rem;
      color: darkgray;
      color: white;
      text-transform: uppercase;
      text-align: center;
      border-radius: 0% 0% 45% 45%;
    }

    body {
      background-color: skyblue;
      color: white;
      font-size: 1.5rem;
      max-width: 756px;
      margin: auto;
    }

    main p * {
      margin-left: 2rem;
      color: transparent;
      display: block;
      font-size: 2.25rem;
      text-transform: capitalize;
      -webkit-text-stroke: gray 1px;
    }

    main p {
      padding: 1rem;
      text-align: left;
      transform: .21s;
    }
  </style>
</head>

<body>
<header>
  <h1>Who Am I?</h1>
</header>
<main>
  <p>I am <span class="whoIAm">Waran Newton Mono Korsuk</span></p>
</main>
</body>
<script src="scripts.js"></script>
</html >
